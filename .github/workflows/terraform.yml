name: Terraform AKS HA

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      action:
        description: "Choose action: apply or destroy"
        required: true
        default: "apply"

jobs:

  # 🟢 APPLY JOB
  terraform-apply:
    if: github.event_name == 'push' || github.event.inputs.action == 'apply'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Register Azure Providers
        run: |
          az provider register --namespace Microsoft.ContainerService
          az provider register --namespace Microsoft.Network
          az provider register --namespace Microsoft.Compute

          echo "Waiting for Microsoft.ContainerService registration..."

          for i in {1..20}; do
            state=$(az provider show --namespace Microsoft.ContainerService --query "registrationState" -o tsv)
            echo "Current state: $state"
            if [ "$state" = "Registered" ]; then
              echo "Provider registered successfully"
              break
            fi
            sleep 10
          done

      - name: Export ARM Credentials
        run: |
          echo "ARM_CLIENT_ID=$(echo '${{ secrets.AZURE_CREDENTIALS }}' | jq -r .clientId)" >> $GITHUB_ENV
          echo "ARM_CLIENT_SECRET=$(echo '${{ secrets.AZURE_CREDENTIALS }}' | jq -r .clientSecret)" >> $GITHUB_ENV
          echo "ARM_SUBSCRIPTION_ID=$(echo '${{ secrets.AZURE_CREDENTIALS }}' | jq -r .subscriptionId)" >> $GITHUB_ENV
          echo "ARM_TENANT_ID=$(echo '${{ secrets.AZURE_CREDENTIALS }}' | jq -r .tenantId)" >> $GITHUB_ENV

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.7

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="resource_group_name=tfstate-rg" \
            -backend-config="storage_account_name=jdterraformstate" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=aks-ha-dev.tfstate"

      - name: Select or Create Workspace
        run: |
          if terraform workspace list | grep -q "dev"; then
            terraform workspace select dev
          else
            terraform workspace new dev
          fi

      - name: Terraform Apply
        run: terraform apply -auto-approve -var-file=env/dev.tfvars

  # 🔴 DESTROY JOB (MANUAL + APPROVAL)
  terraform-destroy:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'
    runs-on: ubuntu-latest

    environment:
      name: production   # 🔥 requires approval in GitHub

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Export ARM Credentials
        run: |
          echo "ARM_CLIENT_ID=$(echo '${{ secrets.AZURE_CREDENTIALS }}' | jq -r .clientId)" >> $GITHUB_ENV
          echo "ARM_CLIENT_SECRET=$(echo '${{ secrets.AZURE_CREDENTIALS }}' | jq -r .clientSecret)" >> $GITHUB_ENV
          echo "ARM_SUBSCRIPTION_ID=$(echo '${{ secrets.AZURE_CREDENTIALS }}' | jq -r .subscriptionId)" >> $GITHUB_ENV
          echo "ARM_TENANT_ID=$(echo '${{ secrets.AZURE_CREDENTIALS }}' | jq -r .tenantId)" >> $GITHUB_ENV

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.7

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="resource_group_name=tfstate-rg" \
            -backend-config="storage_account_name=jdterraformstate" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=aks-ha-dev.tfstate"

      - name: Select Workspace
        run: terraform workspace select dev

      - name: Terraform Destroy
        run: terraform destroy -auto-approve -var-file=env/dev.tfvars
